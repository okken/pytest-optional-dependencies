[tox]
envlist = py310,py311,py312,py313,py314,lint,format,build,twine
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run optional-dependencies test suite with pytest
deps =
    pytest>=8.0
    coverage[toml]
commands =
    coverage run -m pytest -q
    coverage combine
    coverage report

[testenv:lint]
description = Run Ruff checks
skip_install = true
deps =
    ruff>=0.6.0
commands =
    ruff check src tests examples

[testenv:format]
description = Check Ruff formatting
skip_install = true
deps =
    ruff>=0.6.0
commands =
    ruff format --check src tests examples

[testenv:build]
description = Build source and wheel distributions
skip_install = true
deps =
    build>=1.2.0
commands =
    python -m build

[testenv:twine]
description = Validate distribution metadata with twine
skip_install = true
deps =
    twine>=5.1.0
commands =
    python -m twine check dist/*
